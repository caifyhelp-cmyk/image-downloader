name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"   # v1.0.1, v2.0.0 등 태그 push 시 자동 실행

permissions:
  contents: write   # 릴리즈 생성 및 파일 업로드 권한

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: PyInstaller로 exe 빌드
        run: |
          pyinstaller --onefile --windowed `
            --name "ImageDownloader" `
            --hidden-import=playwright `
            --hidden-import=playwright.async_api `
            --hidden-import=playwright._impl._driver `
            --hidden-import=packaging `
            --add-data "version.py;." `
            --add-data "browser_setup.py;." `
            app.py

      - name: GitHub Release 생성 및 exe 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "이미지 다운로더 ${{ github.ref_name }}"
          body: |
            ## 변경 사항
            이 릴리즈의 변경 사항을 여기에 작성하세요.

            ## 다운로드
            아래 `이미지다운로더.exe` 파일을 받아서 바로 실행하세요.
            (설치 불필요)

            ## 사용법
            1. `이미지다운로더.exe` 실행
            2. URL 입력 (포트폴리오 사이트)
            3. 저장 폴더 선택
            4. ▶ 다운로드 시작
          files: dist/ImageDownloader.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
